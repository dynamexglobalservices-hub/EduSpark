
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1117" />
    <title>EduSpark — Learn Smarter</title>
    <link rel="manifest" href="#" id="manifest-link" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0b0e17;
        --surface: #12161f;
        --surface2: #1a1f2e;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e8ecf5;
        --muted: #7a8096;
        --math: white;
        --math-bg: rgba(249, 115, 22, 0.12);
        --science: #22d3ee;
        --science-bg: rgba(34, 211, 238, 0.12);
        --english: white;
        --english-bg: rgba(167, 139, 250, 0.12);
        --accent: #6ee7b7;
        --accent-bg: rgba(110, 231, 183, 0.12);
        --danger: #f87171;
        --radius: 12px;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 15px;
        line-height: 1.6;
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: "Syne", sans-serif;
      }

      /* LAYOUT */
      #app {
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      .sidebar {
        width: 240px;
        min-width: 240px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 24px 0;
        transition: transform 0.3s;
        z-index: 100;
      }
      .sidebar-logo {
        padding: 0 24px 24px;
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 22px;
        letter-spacing: -0.5px;
        color: var(--accent);
        border-bottom: 1px solid var(--border);
        margin-bottom: 16px;
      }
      .sidebar-logo span {
        color: var(--text);
      }
      .nav-group {
        padding: 8px 12px;
      }
      .nav-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0 12px;
        margin-bottom: 4px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        color: var(--muted);
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
      }
      .nav-item:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .nav-item.active {
        background: var(--accent-bg);
        color: var(--accent);
      }
      .nav-item .icon {
        font-size: 18px;
        width: 20px;
        text-align: center;
      }
      .main {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 16px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .topbar h2 {
        font-size: 18px;
        font-weight: 700;
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--english));
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      .hamburger {
        display: none;
        background: none;
        border: none;
        color: var(--text);
        font-size: 22px;
        cursor: pointer;
        padding: 4px;
      }
      .content {
        padding: 28px;
        flex: 1;
      }
      .page {
        display: none;
      }
      .page.active {
        display: block;
      }

      /* CARDS */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      /* SUBJECT CARDS */
      .subject-card {
        border-radius: var(--radius);
        padding: 24px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        border: 1px solid var(--border);
      }
      .subject-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow);
      }
      .subject-card.math {
        background: var(--math-bg);
        border-color: rgba(249, 115, 22, 0.25);
      }
      .subject-card.science {
        background: var(--science-bg);
        border-color: rgba(34, 211, 238, 0.25);
      }
      .subject-card.english {
        background: var(--english-bg);
        border-color: rgba(167, 139, 250, 0.25);
      }
      .subject-icon {
        font-size: 36px;
        margin-bottom: 12px;
      }
      .subject-title {
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .subject-card.math .subject-title {
        color: var(--math);
      }
      .subject-card.science .subject-title {
        color: var(--science);
      }
      .subject-card.english .subject-title {
        color: var(--english);
      }
      .subject-count {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 14px;
      }
      .progress-bar-wrap {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 99px;
        height: 6px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        border-radius: 99px;
        transition: width 0.6s ease;
      }
      .math .progress-bar {
        background: var(--math);
      }
      .science .progress-bar {
        background: var(--science);
      }
      .english .progress-bar {
        background: var(--english);
      }
      .progress-label {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }

      /* STATS ROW */
      .stat-card {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
      }
      .stat-value {
        font-family: "Syne", sans-serif;
        font-size: 32px;
        font-weight: 800;
        color: var(--accent);
      }
      .stat-label {
        font-size: 13px;
        color: var(--muted);
        margin-top: 2px;
      }

      /* QUIZ */
      .quiz-header {
        margin-bottom: 24px;
      }
      .quiz-subject-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 99px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }
      .quiz-subject-badge.math {
        background: var(--math-bg);
        color: var(--math);
      }
      .quiz-subject-badge.science {
        background: var(--science-bg);
        color: var(--science);
      }
      .quiz-subject-badge.english {
        background: var(--english-bg);
        color: var(--english);
      }
      .quiz-question-text {
        font-family: "Syne", sans-serif;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.4;
        margin-bottom: 24px;
      }
      .quiz-options {
        display: grid;
        gap: 12px;
      }
      .quiz-option {
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 18px;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 15px;
      }
      .quiz-option:hover {
        border-color: var(--accent);
        background: var(--accent-bg);
      }
      .quiz-option.correct {
        border-color: var(--accent);
        background: var(--accent-bg);
        color: var(--accent);
      }
      .quiz-option.wrong {
        border-color: var(--danger);
        background: rgba(248, 113, 113, 0.1);
        color: var(--danger);
      }
      .quiz-option.disabled {
        pointer-events: none;
        opacity: 0.6;
      }
      .option-letter {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .quiz-actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        align-items: center;
      }
      .progress-counter {
        font-size: 13px;
        color: var(--muted);
        margin-left: auto;
      }
      .quiz-progress-bar {
        height: 4px;
        background: var(--border);
        border-radius: 99px;
        margin-bottom: 24px;
        overflow: hidden;
      }
      .quiz-progress-fill {
        height: 100%;
        border-radius: 99px;
        background: var(--accent);
        transition: width 0.4s;
      }
      .feedback-box {
        padding: 14px 18px;
        border-radius: var(--radius);
        margin-top: 16px;
        font-size: 14px;
        display: none;
      }
      .feedback-box.correct {
        background: var(--accent-bg);
        border: 1px solid rgba(110, 231, 183, 0.3);
        color: var(--accent);
      }
      .feedback-box.wrong {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: var(--danger);
      }

      /* RESULTS */
      .results-card {
        text-align: center;
        padding: 48px 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        max-width: 480px;
        margin: 0 auto;
      }
      .results-emoji {
        font-size: 64px;
        margin-bottom: 16px;
      }
      .results-score {
        font-family: "Syne", sans-serif;
        font-size: 56px;
        font-weight: 800;
        color: var(--accent);
        line-height: 1;
      }
      .results-label {
        color: var(--muted);
        margin: 8px 0 24px;
      }
      .results-breakdown {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 24px;
      }
      .rb-item {
        background: var(--surface2);
        border-radius: 10px;
        padding: 14px;
      }
      .rb-val {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 700;
      }
      .rb-key {
        font-size: 12px;
        color: var(--muted);
      }

      /* ADMIN */
      .admin-tabs {
        display: flex;
        gap: 4px;
        background: var(--surface2);
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 24px;
        width: fit-content;
      }
      .admin-tab {
        padding: 8px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        color: var(--muted);
        border: none;
        background: none;
        transition: all 0.2s;
      }
      .admin-tab.active {
        background: var(--surface);
        color: var(--text);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }
      .form-group {
        margin-bottom: 18px;
      }
      .form-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 6px;
        display: block;
      }
      .form-input,
      .form-select,
      .form-textarea {
        width: 100%;
        padding: 10px 14px;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }
      .form-input:focus,
      .form-select:focus,
      .form-textarea:focus {
        border-color: var(--accent);
      }
      .form-select option {
        background: var(--surface2);
      }
      .form-textarea {
        resize: vertical;
        min-height: 80px;
      }
      .options-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .option-input-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .option-label-badge {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        flex-shrink: 0;
        background: var(--surface);
        border: 1.5px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
      }
      .btn {
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .btn-primary {
        background: var(--accent);
        color: #0b1a14;
      }
      .btn-primary:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }
      .btn-secondary {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-danger {
        background: rgba(248, 113, 113, 0.15);
        color: var(--danger);
        border: 1px solid rgba(248, 113, 113, 0.25);
      }
      .btn-danger:hover {
        background: rgba(248, 113, 113, 0.25);
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 99px;
        font-size: 11px;
        font-weight: 600;
      }
      .badge-math {
        background: var(--math-bg);
        color: var(--math);
      }
      .badge-science {
        background: var(--science-bg);
        color: var(--science);
      }
      .badge-english {
        background: var(--english-bg);
        color: var(--english);
      }

      /* TABLE */
      .table-wrap {
        overflow-x: auto;
        border-radius: var(--radius);
        border: 1px solid var(--border);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        padding: 12px 16px;
        text-align: left;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
      }
      td {
        padding: 13px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        font-size: 14px;
        vertical-align: middle;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }

      /* PROGRESS PAGE */
      .progress-subject-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .progress-subject-icon {
        font-size: 28px;
      }
      .progress-detail-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }
      .detail-bar-label {
        width: 120px;
        font-size: 13px;
        color: var(--muted);
      }
      .detail-bar-track {
        flex: 1;
        height: 8px;
        background: var(--surface2);
        border-radius: 99px;
        overflow: hidden;
      }
      .detail-bar-fill {
        height: 100%;
        border-radius: 99px;
      }

      /* TOAST */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 20px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: var(--shadow);
        z-index: 999;
        transform: translateY(80px);
        opacity: 0;
        transition: all 0.3s;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
      .toast.success {
        border-color: rgba(110, 231, 183, 0.4);
        color: var(--accent);
      }
      .toast.error {
        border-color: rgba(248, 113, 113, 0.4);
        color: var(--danger);
      }

      /* OFFLINE BANNER */
      .offline-banner {
        background: rgba(249, 115, 22, 0.15);
        border-bottom: 1px solid rgba(249, 115, 22, 0.3);
        padding: 8px 24px;
        text-align: center;
        font-size: 13px;
        color: var(--math);
        display: none;
      }
      .offline-banner.show {
        display: block;
      }

      /* MODAL */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        width: 100%;
        max-width: 520px;
        max-height: 90vh;
        overflow-y: auto;
        transform: scale(0.95);
        transition: transform 0.2s;
      }
      .modal-overlay.open .modal {
        transform: scale(1);
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .modal-title {
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 700;
      }
      .close-btn {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 20px;
        cursor: pointer;
        padding: 4px;
      }
      .close-btn:hover {
        color: var(--text);
      }

      /* WELCOME BANNER */
      .welcome-banner {
        background: linear-gradient(
          135deg,
          rgba(110, 231, 183, 0.12),
          rgba(167, 139, 250, 0.08)
        );
        border: 1px solid rgba(110, 231, 183, 0.2);
        border-radius: 16px;
        padding: 28px;
        margin-bottom: 24px;
        position: relative;
        overflow: hidden;
      }
      .welcome-banner::before {
        content: "";
        position: absolute;
        top: -40px;
        right: -40px;
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          rgba(110, 231, 183, 0.12),
          transparent 70%
        );
      }
      .welcome-title {
        font-family: "Syne", sans-serif;
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 6px;
      }
      .welcome-sub {
        color: var(--muted);
        font-size: 14px;
      }

      /* STREAKS */
      .streak-dots {
        display: flex;
        gap: 6px;
        margin-top: 12px;
      }
      .streak-dot {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .streak-dot.done {
        background: var(--accent-bg);
      }

      /* MOBILE OVERLAY */
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 99;
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          transform: translateX(-100%);
        }
        .sidebar.open {
          transform: translateX(0);
        }
        .sidebar-overlay.show {
          display: block;
        }
        .hamburger {
          display: block;
        }
        .grid-3 {
          grid-template-columns: 1fr;
        }
        .grid-2 {
          grid-template-columns: 1fr;
        }
        .content {
          padding: 16px;
        }
        .topbar {
          padding: 12px 16px;
        }
        .options-grid {
          grid-template-columns: 1fr;
        }
        .results-breakdown {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="offline-banner" id="offlineBanner">
      📶 You're offline — previously loaded content is still available
    </div>

    <div id="app">
      <div
        class="sidebar-overlay"
        id="sidebarOverlay"
        onclick="closeSidebar()"
      ></div>

      <!-- SIDEBAR -->
      <nav class="sidebar" id="sidebar">
        <div class="sidebar-logo">Edu<span>Spark</span></div>
        <div class="nav-group">
          <div class="nav-label">Learn</div>
          <button class="nav-item active" onclick="navigate('home')">
            <span class="icon">🏠</span> Dashboard
          </button>
          <button class="nav-item" onclick="navigate('quiz-select')">
            <span class="icon">⚡</span> Practice Quiz
          </button>
          <button class="nav-item" onclick="navigate('progress')">
            <span class="icon">📈</span> My Progress
          </button>
        </div>
        <div class="nav-group" style="margin-top: 8px">
          <div class="nav-label">Subjects</div>
          <button class="nav-item" onclick="startSubjectQuiz('math')">

            options: ["Simile", "Metaphor", "Personification", "Alliteration"],

              "Personification gives human qualities (whispering) to a non-human thing (wind)",

          {
            id: 18,
            subject: "english",

            question: 'What is the antonym of "benevolent"?',
            options: ["Kind", "Generous", "Malevolent", "Charitable"],
            correct: 2,
            explanation:
              '"Malevolent" means wishing evil to others — opposite of benevolent',
          },
        ],
        progress: {
          math: { attempted: 0, correct: 0, sessions: 0 },
          science: { attempted: 0, correct: 0, sessions: 0 },
          english: { attempted: 0, correct: 0, sessions: 0 },
        },
        streak: 0,
        lastActive: null,
        totalSessions: 0,
        nextId: 19,
      };

      function loadData() {
        try {
          const raw = localStorage.getItem(STORE_KEY);
          if (raw) return JSON.parse(raw);
        } catch (e) {}
        return JSON.parse(JSON.stringify(defaultData));
      }

      function saveData(d) {
        try {
          localStorage.setItem(STORE_KEY, JSON.stringify(d));
        } catch (e) {}
      }

      let DB = loadData();

      // ═══════════════════════════════════════════
      // NAVIGATION
      // ═══════════════════════════════════════════
      const pageTitles = {
        home: "Dashboard",
        "quiz-select": "Practice Quiz",
        quiz: "Quiz",
        results: "Results",
        progress: "My Progress",
        admin: "Admin Panel",
      };

      function navigate(page) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(".nav-item")
          .forEach((n) => n.classList.remove("active"));
        const el = document.getElementById("page-" + page);
        if (el) el.classList.add("active");
        document.getElementById("pageTitle").textContent =
          pageTitles[page] || "EduSpark";
        closeSidebar();
        if (page === "home") renderHome();
        if (page === "quiz-select") renderQuizSelect();
        if (page === "progress") renderProgress();
        if (page === "admin") {
          renderManageTable();
          renderAdminStats();
        }
      }

      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("sidebarOverlay").classList.toggle("show");
      }
      function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sidebarOverlay").classList.remove("show");
      }

      // ═══════════════════════════════════════════
      // HOME
      // ═══════════════════════════════════════════
      function renderHome() {
        updateStreak();
        document.getElementById("streakCount").textContent = DB.streak;

        // Streak dots (last 7 days indicator — simulated)
        const dots = document.getElementById("streakDots");
        dots.innerHTML = Array.from({ length: 7 }, (_, i) => {
          const done = i < Math.min(DB.streak, 7);
          const labels = ["M", "T", "W", "T", "F", "S", "S"];
          return `<div class="streak-dot ${done ? "done" : ""}" title="${labels[i]}">${done ? "✓" : labels[i]}</div>`;
        }).join("");

        // Stats
        const total =
          DB.progress.math.attempted +
          DB.progress.science.attempted +
          DB.progress.english.attempted;
        const correct =
          DB.progress.math.correct +
          DB.progress.science.correct +
          DB.progress.english.correct;
        const acc = total > 0 ? Math.round((correct / total) * 100) : 0;
        document.getElementById("statsRow").innerHTML = `
    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Questions Attempted</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--math)">${acc}%</div><div class="stat-label">Overall Accuracy</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--english)">${DB.totalSessions}</div><div class="stat-label">Sessions Completed</div></div>
  `;

        // Subject cards
        const subjects = [
          { key: "math", icon: "🔢", label: "Mathematics", color: "math" },
          { key: "science", icon: "🔬", label: "Science", color: "science" },
          { key: "english", icon: "📖", label: "English", color: "english" },
        ];
        document.getElementById("subjectCards").innerHTML = subjects
          .map((s) => {
            const p = DB.progress[s.key];
            const qCount = DB.questions.filter(
              (q) => q.subject === s.key,
            ).length;
            const pct =
              p.attempted > 0 ? Math.round((p.correct / p.attempted) * 100) : 0;
            return `<div class="subject-card ${s.color}" onclick="startSubjectQuiz('${s.key}')">
      <div class="subject-icon">${s.icon}</div>
      <div class="subject-title">${s.label}</div>
      <div class="subject-count">${qCount} questions · ${p.sessions} sessions</div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="progress-label">${pct}% accuracy</div>
    </div>`;
          })
          .join("");
      }

      function updateStreak() {
        const today = new Date().toDateString();
        if (DB.lastActive === today) return;
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        if (DB.lastActive === yesterday) DB.streak++;
        else if (DB.lastActive !== today)
          DB.streak = DB.streak > 0 ? DB.streak : 0;
        DB.lastActive = today;
        saveData(DB);
      }

      // ═══════════════════════════════════════════
      // QUIZ
      // ═══════════════════════════════════════════
      let quizState = {};

      function renderQuizSelect() {
        const subjects = [
          {
            key: "math",
            icon: "🔢",
            label: "Mathematics",
            color: "math",
            desc: "Arithmetic, algebra, geometry & more",
          },
          {
            key: "science",
            icon: "🔬",
            label: "Science",
            color: "science",
            desc: "Biology, chemistry, physics & more",
          },
          {
            key: "english",
            icon: "📖",
            label: "English",
            color: "english",
            desc: "Grammar, vocabulary, comprehension",
          },
        ];
        document.getElementById("quizSelectCards").innerHTML = subjects
          .map((s) => {
            const count = DB.questions.filter(
              (q) => q.subject === s.key,
            ).length;
            return `<div class="subject-card ${s.color}" onclick="startSubjectQuiz('${s.key}')">
      <div class="subject-icon">${s.icon}</div>
      <div class="subject-title">${s.label}</div>
      <div class="subject-count">${s.desc}</div>
      <div style="margin-top:16px;"><span class="btn btn-secondary btn-sm">${count} Questions Available →</span></div>
    </div>`;
          })
          .join("");
      }

      function startSubjectQuiz(subject) {
        const qs = DB.questions.filter((q) => q.subject === subject);
        if (qs.length === 0) {
          showToast("No questions available for this subject!", "error");
          return;
        }
        const shuffled = [...qs]
          .sort(() => Math.random() - 0.5)
          .slice(0, Math.min(10, qs.length));
        quizState = {
          subject,
          questions: shuffled,
          current: 0,
          score: 0,
          answers: [],
        };
        navigate("quiz");
        renderQuestion();
      }

      function renderQuestion() {
        const { questions, current, subject } = quizState;
        if (current >= questions.length) {
          showResults();
          return;
        }
        const q = questions[current];
        const pct = (current / questions.length) * 100;
        document.getElementById("quizProgressFill").style.width = pct + "%";
        document.getElementById("quizContent").innerHTML = `
    <div class="quiz-header">
      <div class="quiz-subject-badge ${subject}">${subject.charAt(0).toUpperCase() + subject.slice(1)} · ${q.difficulty}</div>
      <div class="quiz-question-text">${current + 1}. ${q.question}</div>
    </div>
    <div class="quiz-options" id="quizOptions">
      ${q.options
        .map(
          (opt, i) => `
        <button class="quiz-option" onclick="selectAnswer(${i})" id="opt${i}">
          <div class="option-letter">${"ABCD"[i]}</div>${opt}
        </button>`,
        )
        .join("")}
    </div>
    <div class="feedback-box" id="feedbackBox"></div>
    <div class="quiz-actions">
      <span class="progress-counter">${current + 1} / ${questions.length}</span>
    </div>
  `;
      }

      function selectAnswer(idx) {
        const { questions, current, subject } = quizState;
        const q = questions[current];
        const correct = q.correct === idx;
        quizState.answers.push({ questionId: q.id, selected: idx, correct });
        if (correct) quizState.score++;

        // Style options
        document.querySelectorAll(".quiz-option").forEach((el, i) => {
          el.classList.add("disabled");
          if (i === q.correct) el.classList.add("correct");
          else if (i === idx && !correct) el.classList.add("wrong");
        });

        // Feedback
        const fb = document.getElementById("feedbackBox");
        fb.className = "feedback-box " + (correct ? "correct" : "wrong");
        fb.style.display = "block";
        fb.innerHTML = correct
          ? `✅ Correct! ${q.explanation ? q.explanation : ""}`
          : `❌ Wrong. The correct answer is <strong>${q.options[q.correct]}</strong>. ${q.explanation ? q.explanation : ""}`;

        // Auto-advance
        setTimeout(() => {
          quizState.current++;
          renderQuestion();
        }, 1800);
      }

      function showResults() {
        const { subject, questions, score } = quizState;
        const total = questions.length;
        const pct = Math.round((score / total) * 100);
        const emoji =
          pct >= 80 ? "🎉" : pct >= 60 ? "👍" : pct >= 40 ? "💪" : "📚";
        const msg =
          pct >= 80
            ? "Excellent work!"
            : pct >= 60
              ? "Good job!"
              : pct >= 40
                ? "Keep practicing!"
                : "Study more and try again!";

        // Update progress
        DB.progress[subject].attempted += total;
        DB.progress[subject].correct += score;
        DB.progress[subject].sessions++;
        DB.totalSessions++;
        DB.streak = Math.max(1, DB.streak);
        DB.lastActive = new Date().toDateString();
        saveData(DB);

        navigate("results");
        document.getElementById("quizProgressFill").style.width = "100%";
        document.getElementById("resultsCard").innerHTML = `
    <div class="results-emoji">${emoji}</div>
    <div class="results-score">${pct}%</div>
    <div class="results-label">${msg}</div>
    <div class="results-breakdown">
      <div class="rb-item"><div class="rb-val" style="color:var(--accent)">${score}</div><div class="rb-key">Correct</div></div>
      <div class="rb-item"><div class="rb-val" style="color:var(--danger)">${total - score}</div><div class="rb-key">Wrong</div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="startSubjectQuiz('${subject}')">🔄 Try Again</button>
      <button class="btn btn-secondary" onclick="navigate('quiz-select')">📚 Other Subjects</button>
      <button class="btn btn-secondary" onclick="navigate('progress')">📈 View Progress</button>
    </div>
  `;
      }

      // ═══════════════════════════════════════════
      // PROGRESS
      // ═══════════════════════════════════════════
      function renderProgress() {
        const subjects = [
          {
            key: "math",
            icon: "🔢",
            label: "Mathematics",
            color: "math",
            varColor: "var(--math)",
          },
          {
            key: "science",
            icon: "🔬",
            label: "Science",
            color: "science",
            varColor: "var(--science)",
          },
          {
            key: "english",
            icon: "📖",
            label: "English",
            color: "english",
            varColor: "var(--english)",
          },
        ];
        const total =
          DB.progress.math.attempted +
          DB.progress.science.attempted +
          DB.progress.english.attempted;
        const correct =
          DB.progress.math.correct +
          DB.progress.science.correct +
          DB.progress.english.correct;
        const overall = total > 0 ? Math.round((correct / total) * 100) : 0;

        let html = `
    <div class="grid-3" style="margin-bottom:24px;">
      <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Attempted</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--accent)">${overall}%</div><div class="stat-label">Overall Accuracy</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--english)">${DB.streak}</div><div class="stat-label">Day Streak 🔥</div></div>
    </div>
  `;

        subjects.forEach((s) => {
          const p = DB.progress[s.key];
          const acc =
            p.attempted > 0 ? Math.round((p.correct / p.attempted) * 100) : 0;
          const wrong = p.attempted - p.correct;
          html += `
      <div class="card" style="margin-bottom:16px;">
        <div class="progress-subject-header">
          <div class="progress-subject-icon">${s.icon}</div>
          <div>
            <h3 style="font-family:'Syne',sans-serif;font-size:16px;">${s.label}</h3>
            <div style="font-size:13px;color:var(--muted)">${p.sessions} sessions completed</div>
          </div>
          <div style="margin-left:auto;font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:${s.varColor}">${acc}%</div>
        </div>
        <div class="progress-detail-bar">
          <div class="detail-bar-label">Accuracy</div>
          <div class="detail-bar-track"><div class="detail-bar-fill" style="width:${acc}%;background:${s.varColor}"></div></div>
          <div style="font-size:13px;width:40px;text-align:right">${acc}%</div>
        </div>
        <div class="progress-detail-bar">
          <div class="detail-bar-label">Attempted</div>
          <div style="font-size:14px;font-weight:600;">${p.attempted}</div>
        </div>
        <div style="display:flex;gap:16px;margin-top:12px;">
          <div style="font-size:13px;color:var(--accent)">✅ ${p.correct} correct</div>
          <div style="font-size:13px;color:var(--danger)">❌ ${wrong} wrong</div>
        </div>
        <button class="btn btn-secondary btn-sm" style="margin-top:14px;" onclick="startSubjectQuiz('${s.key}')">Practice →</button>
      </div>`;
        });

        // Reset option
        html += `<div style="margin-top:8px;"><button class="btn btn-danger btn-sm" onclick="resetProgress()">🗑 Reset All Progress</button></div>`;
        document.getElementById("progressContent").innerHTML = html;
      }

      function resetProgress() {
        if (
          !confirm(
            "Are you sure you want to reset all progress? This cannot be undone.",
          )
        )
          return;
        DB.progress = {
          math: { attempted: 0, correct: 0, sessions: 0 },
          science: { attempted: 0, correct: 0, sessions: 0 },
          english: { attempted: 0, correct: 0, sessions: 0 },
        };
        DB.streak = 0;
        DB.totalSessions = 0;
        saveData(DB);
        renderProgress();
        showToast("Progress reset successfully", "success");
      }

      // ═══════════════════════════════════════════
      // ADMIN
      // ═══════════════════════════════════════════
      function switchAdminTab(tab) {
        document.querySelectorAll(".admin-tab").forEach((t, i) => {
          const tabs = ["add", "manage", "stats"];
          t.classList.toggle("active", tabs[i] === tab);
        });
        document.getElementById("admin-add").style.display =
          tab === "add" ? "block" : "none";
        document.getElementById("admin-manage").style.display =
          tab === "manage" ? "block" : "none";
        document.getElementById("admin-stats").style.display =
          tab === "stats" ? "block" : "none";
        if (tab === "manage") renderManageTable();
        if (tab === "stats") renderAdminStats();
      }

      function addQuestion() {
        const q = document.getElementById("addQuestion").value.trim();
        const a = document.getElementById("optA").value.trim();
        const b = document.getElementById("optB").value.trim();
        const c = document.getElementById("optC").value.trim();
        const d = document.getElementById("optD").value.trim();
        if (!q || !a || !b || !c || !d) {
          showToast("Please fill all required fields", "error");
          return;
        }
        DB.questions.push({
          id: DB.nextId++,
          subject: document.getElementById("addSubject").value,
          difficulty: document.getElementById("addDifficulty").value,
          question: q,
          options: [a, b, c, d],
          correct: parseInt(document.getElementById("addCorrect").value),
          explanation: document.getElementById("addExplanation").value.trim(),
        });
        saveData(DB);
        showToast("Question added successfully! ✅", "success");
        document.getElementById("addQuestion").value = "";
        ["optA", "optB", "optC", "optD", "addExplanation"].forEach(
          (id) => (document.getElementById(id).value = ""),
        );
      }

      function renderManageTable() {
        const filter = document.getElementById("filterSubject")?.value || "all";
        const qs =
          filter === "all"
            ? DB.questions
            : DB.questions.filter((q) => q.subject === filter);
        document.getElementById("questionsBody").innerHTML = qs
          .map(
            (q, i) => `
    <tr>
      <td style="color:var(--muted);font-size:12px">${i + 1}</td>
      <td><span class="badge badge-${q.subject}">${q.subject}</span></td>
      <td style="max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${q.question}</td>
      <td style="font-size:12px;color:var(--muted)">${q.difficulty}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="openEdit(${q.id})" style="margin-right:6px;">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteQuestion(${q.id})">Delete</button>
      </td>
    </tr>`,
          )
          .join("");
      }

      function renderAdminStats() {
        const subjects = ["math", "science", "english"];
        const icons = { math: "🔢", science: "🔬", english: "📖" };
        const labels = {
          math: "Mathematics",
          science: "Science",
          english: "English",
        };
        document.getElementById("adminStatsCards").innerHTML = subjects
          .map((s) => {
            const count = DB.questions.filter((q) => q.subject === s).length;
            const easy = DB.questions.filter(
              (q) => q.subject === s && q.difficulty === "easy",
            ).length;
            const med = DB.questions.filter(
              (q) => q.subject === s && q.difficulty === "medium",
            ).length;
            const hard = DB.questions.filter(
              (q) => q.subject === s && q.difficulty === "hard",
            ).length;
            return `<div class="card">
      <div style="font-size:28px;margin-bottom:8px">${icons[s]}</div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:4px;">${labels[s]}</div>
      <div style="font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--accent)">${count}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px;">Easy: ${easy} · Medium: ${med} · Hard: ${hard}</div>
    </div>`;
          })
          .join("");
      }

      let editingId = null;
      function openEdit(id) {
        const q = DB.questions.find((x) => x.id === id);
        if (!q) return;
        editingId = id;
        document.getElementById("editSubject").value = q.subject;
        document.getElementById("editDifficulty").value = q.difficulty;
        document.getElementById("editQuestion").value = q.question;
        document.getElementById("editOptA").value = q.options[0];
        document.getElementById("editOptB").value = q.options[1];
        document.getElementById("editOptC").value = q.options[2];
        document.getElementById("editOptD").value = q.options[3];
        document.getElementById("editCorrect").value = q.correct;
        document.getElementById("editExplanation").value = q.explanation || "";
        document.getElementById("editModal").classList.add("open");
      }

      function saveEdit() {
        const q = DB.questions.find((x) => x.id === editingId);
        if (!q) return;
        q.subject = document.getElementById("editSubject").value;
        q.difficulty = document.getElementById("editDifficulty").value;
        q.question = document.getElementById("editQuestion").value;
        q.options = [
          document.getElementById("editOptA").value,
          document.getElementById("editOptB").value,
          document.getElementById("editOptC").value,
          document.getElementById("editOptD").value,
        ];
        q.correct = parseInt(document.getElementById("editCorrect").value);
        q.explanation = document.getElementById("editExplanation").value;
        saveData(DB);
        closeModal();
        renderManageTable();
        showToast("Question updated!", "success");
      }

      function deleteQuestion(id) {
        if (!confirm("Delete this question?")) return;
        DB.questions = DB.questions.filter((q) => q.id !== id);
        saveData(DB);
        renderManageTable();
        renderAdminStats();
        showToast("Question deleted", "success");
      }

      function closeModal() {
        document.getElementById("editModal").classList.remove("open");
      }

      // ═══════════════════════════════════════════
      // TOAST
      // ═══════════════════════════════════════════
      function showToast(msg, type = "success") {
        const t = document.getElementById("toast");
        t.className = `toast ${type} show`;
        t.innerHTML = (type === "success" ? "✅" : "❌") + " " + msg;
        setTimeout(() => t.classList.remove("show"), 3000);
      }

      // ═══════════════════════════════════════════
      // OFFLINE DETECTION
      // ═══════════════════════════════════════════
      function checkOnline() {
        const offline = !navigator.onLine;
        document
          .getElementById("offlineBanner")
          .classList.toggle("show", offline);
        document.getElementById("onlineIndicator").style.background = offline
          ? "var(--danger)"
          : "var(--accent)";
      }
      window.addEventListener("online", checkOnline);
      window.addEventListener("offline", checkOnline);
      checkOnline();

      // ═══════════════════════════════════════════
      // SERVICE WORKER (PWA OFFLINE SUPPORT)
      // ═══════════════════════════════════════════
      if ("serviceWorker" in navigator) {
        const swCode = `
    const CACHE = 'eduspark-v1';
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/']))));
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request).then(res => {
        return caches.open(CACHE).then(c => { c.put(e.request, res.clone()); return res; });
      }).catch(() => caches.match('/'))
    ));
  `;
        const blob = new Blob([swCode], { type: "application/javascript" });
        const url = URL.createObjectURL(blob);
        navigator.serviceWorker.register(url).catch(() => {});
      }

      // ═══════════════════════════════════════════
      // INIT
      // ═══════════════════════════════════════════
      renderHome();
    </script>
  </body>
</html>
